services:
  digit-recognizer:
    build: .
    image: digit-recognizer
    environment:
      # DISPLAY is read from your shell's environment (see README for
      # the value to export on each OS before running `docker compose up`)
      - DISPLAY=${DISPLAY}
    volumes:
      # Forwards the X11 socket so the container can draw its window
      # on your host's display. Linux/macOS path -- see README for
      # the Windows equivalent (which doesn't use this line at all).
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
 